name: Enviar mensagem de teste para o Telegram

# "on" define QUANDO esse robô deve rodar
on:
  # Permite rodar manualmente, clicando num botão no GitHub (ótimo para testar)
  workflow_dispatch:

  # Roda automaticamente em um horário (formato cron, em UTC)
  # "0 12 * * *" = todo dia às 12:00 UTC (09:00 no horário de Brasília)
  schedule:
    - cron: "0 12 * * *"

jobs:
  enviar-mensagem:
    runs-on: ubuntu-latest  # o "computador temporário" que o GitHub liga pra gente

    steps:
      # Passo 1: baixa o código do seu repositório para esse computador temporário
      - name: Baixar código
        uses: actions/checkout@v4

      # Passo 2: instala o Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Passo 3: instala a biblioteca "requests", que o script usa
      - name: Instalar dependências
        run: pip install requests

      # Passo 4: executa o script, passando os Secrets como variáveis de ambiente
      - name: Executar script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python enviar_telegram.py
