name: Rastreador de Ofertas

# "on" define QUANDO esse robô deve rodar
on:
  # Permite rodar manualmente, clicando num botão no GitHub (ótimo para testar)
  workflow_dispatch:

  # Roda automaticamente a cada 1 hora
  schedule:
    - cron: "0 * * * *"

jobs:
  checar-precos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Executar rastreador
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rastreador.py

      # Esse passo salva o histórico atualizado de volta no repositório.
      # Sem isso, a cada execução o histórico seria perdido (o GitHub Actions
      # roda em uma máquina "descartável" que não guarda nada sozinha).
      - name: Salvar histórico atualizado
        run: |
          git config user.name "Rastreador Bot"
          git config user.email "bot@rastreador.local"
          git add historico_precos.json
          git diff --staged --quiet || git commit -m "Atualiza histórico de preços"
          git push
